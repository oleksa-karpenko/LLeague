version: 2
updates:
  # .NET / NuGet — backend solution (api + tests)
  - package-ecosystem: nuget
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dotnet:
        patterns: ["*"]

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
