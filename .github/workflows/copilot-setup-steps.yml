# Provisions the environment for the GitHub Copilot coding agent so it can build & test LLeague.
# The job MUST be named `copilot-setup-steps` for Copilot to pick it up.
# Also runnable manually / on changes to this file so you can verify it.
name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    name: Setup backend + frontend toolchain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Restore backend
        run: dotnet restore backend/LLeague.slnx

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install coverage tool
        run: dotnet tool install --global dotnet-reportgenerator-globaltool || true
